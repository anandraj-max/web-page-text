<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nimbus marketing · image gen</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-2: #475569;
    --text-3: #94a3b8;
    --primary: #1e40af;
    --primary-hover: #1e3a8a;
    --primary-soft: #dbeafe;
    --primary-2: #0ea5e9;
    --danger: #dc2626;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.05);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.08);
    --shadow-lg: 0 12px 28px rgba(15,23,42,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow: hidden; /* desktop: no body scroll */
    -webkit-font-smoothing: antialiased;
  }

  /* ============ APP SHELL ============ */
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ============ TOPBAR ============ */
  .topbar {
    flex: 0 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 24px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .brand-1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--primary);
  }
  .brand-2 {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 400;
  }
  .brand-2::before { content: '/ '; color: var(--text-3); margin-right: 2px; }

  .switcher {
    display: inline-flex;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .opt {
    padding: 7px 14px;
    border: none;
    background: transparent;
    color: var(--text-2);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .opt:hover { color: var(--text); }
  .opt.active {
    background: var(--primary);
    color: #ffffff;
    box-shadow: var(--shadow-sm);
  }
  .opt-meta {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    opacity: 0.7;
    font-weight: 500;
  }

  /* ============ MAIN GRID ============ */
  .grid {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: 0;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px;
    background: var(--bg-soft);
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 0;
    overflow-y: auto;
  }
  .label {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 8px;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .section-head .label { margin-bottom: 0; }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: 3px 9px 3px 7px;
    border-radius: 6px;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  .refresh-btn:hover {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary);
  }
  .refresh-icon {
    display: inline-block;
    font-size: 13px;
    line-height: 1;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .refresh-btn.spinning .refresh-icon { transform: rotate(360deg); }

  @keyframes chipFadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--surface);
    color: var(--text-2);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    animation: chipFadeIn 0.25s ease-out backwards;
  }
  .chip:hover {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary);
  }
  .chip:active { transform: translateY(1px); }

  /* Form */
  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea {
    resize: vertical;
    min-height: 96px;
    max-height: 240px;
    font-family: inherit;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  input[type="text"]:disabled, textarea:disabled { opacity: 0.5; background: var(--bg-soft); cursor: not-allowed; }
  .input-hint {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    color: var(--text-3);
    margin-top: -4px;
    letter-spacing: 0.04em;
  }
  .input-hint kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    color: var(--text-2);
    margin: 0 1px;
  }
  button.gen {
    width: 100%;
    background: var(--primary);
    color: #ffffff;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: var(--shadow-md);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button.gen:hover:not(:disabled) { background: var(--primary-hover); }
  button.gen:active:not(:disabled) { transform: translateY(1px); }
  button.gen:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

  /* ============ CANVAS ============ */
  .canvas {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    background: var(--bg);
  }
  .result {
    flex: 1 1 auto;
    min-height: 0;
    border-radius: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .result.empty::before {
    content: 'Image yahan dikhega \2014  prompt likh ya chip pakad';
    color: var(--text-3);
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .result img {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    text-align: center;
  }
  .error {
    padding: 24px;
    text-align: center;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    max-width: 480px;
  }

  /* Meta footer */
  .meta {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 44px;
  }
  .meta:empty, .meta.hidden { display: none; }
  .meta-prompt {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 11px;
    color: var(--text-2);
    flex: 1;
    min-width: 0;
    word-break: break-word;
    line-height: 1.4;
  }
  .meta-tag {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 5px;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .download-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .download-btn:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }

  /* Tweak bar */
  .tweak-bar {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tweak-bar.hidden { display: none; }
  .tweak-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .tweak-bar input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .tweak-bar button {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .tweak-bar button:hover:not(:disabled) { background: var(--primary-hover); }
  .tweak-bar button:disabled { opacity: 0.6; cursor: not-allowed; }
  .tweak-hint {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.04em;
    padding-left: 4px;
  }
  .tweak-hint.hidden { display: none; }

  /* Password modal */
  .pw-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.5);
    backdrop-filter: blur(4px);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pw-overlay.show { display: flex; }
  .pw-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .pw-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .pw-card p { color: var(--text-2); font-size: 12px; margin-bottom: 14px; }
  .pw-card input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .pw-card .pw-actions { display: flex; gap: 8px; margin-top: 8px; }
  .pw-card button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .pw-card button.primary { background: var(--primary); color: #fff; }
  .pw-card button.ghost { background: var(--bg-soft); color: var(--text-2); border: 1px solid var(--border); }
  .pw-error { color: var(--danger); font-size: 11px; min-height: 14px; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 880px) {
    body { overflow: auto; }
    .app { height: auto; min-height: 100vh; }
    .topbar {
      flex-wrap: wrap;
      height: auto;
      padding: 12px 16px;
      gap: 10px;
    }
    .grid {
      grid-template-columns: 1fr;
      flex: none;
    }
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
      overflow-y: visible;
    }
    .canvas { padding: 16px; }
    .result { aspect-ratio: 1 / 1; min-height: 280px; }
    form { margin-top: 8px; }
  }
  @media (max-width: 480px) {
    .opt { padding: 6px 10px; font-size: 12px; }
    .opt-meta { display: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-1">Nimbus</span>
        <span class="brand-2">marketing</span>
      </div>
      <div class="switcher" role="radiogroup" aria-label="Model">
        <button class="opt active" data-model="pollinations">
          Pollinations <span class="opt-meta">free</span>
        </button>
        <button class="opt" data-model="cloudflare-flux">
          FLUX schnell <span class="opt-meta">200/day</span>
        </button>
        <button class="opt" data-model="kling">
          Kling <span class="opt-meta">v2 · paid</span>
        </button>
      </div>
    </header>

    <main class="grid">
      <aside class="sidebar">
        <div>
          <div class="section-head">
            <div class="label">Logistics prompts</div>
            <button type="button" class="refresh-btn" id="refreshChips" title="Get new prompt suggestions">
              <span class="refresh-icon">↻</span> shuffle
            </button>
          </div>
          <div class="chips" id="chips"></div>
        </div>

        <form id="form">
          <div class="label">Prompt</div>
          <textarea id="prompt" rows="4" placeholder="Describe your image — long descriptive prompts work best. Include style, lighting, composition, mood..."></textarea>
          <div class="input-hint"><kbd>⌘</kbd>+<kbd>Enter</kbd> to generate · <kbd>Enter</kbd> for new line</div>
          <button type="submit" class="gen" id="genBtn">Generate</button>
        </form>
      </aside>

      <section class="canvas">
        <div class="result empty" id="result"></div>
        <div class="meta hidden" id="meta">
          <div class="meta-prompt">
            <span class="meta-tag" id="metaTag">FLUX</span>
            <span id="lastPrompt"></span>
          </div>
          <button class="download-btn" id="downloadBtn">↓ Download</button>
        </div>
        <div class="tweak-hint hidden" id="tweakHint">▸ tweak this image · only describe what to change (uses flux-2-klein, ~$0.015/edit if free tier exhausted)</div>
        <div class="tweak-bar hidden" id="tweakBar">
          <input type="text" id="tweakInput" placeholder="Describe just the change — e.g. 'make ribbon blue, keep rest same'" autocomplete="off" />
          <button type="button" id="tweakBtn">Apply tweak</button>
        </div>
      </section>
    </main>
  </div>

  <div class="pw-overlay" id="pwOverlay">
    <div class="pw-card">
      <h3>Dashboard password</h3>
      <p>Server has auth enabled — enter password (saved in this browser).</p>
      <form id="pwForm">
        <input type="password" id="pwInput" placeholder="password" autocomplete="off" />
        <div class="pw-error" id="pwError"></div>
        <div class="pw-actions">
          <button type="button" class="ghost" id="pwCancel">Cancel</button>
          <button type="submit" class="primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

<script>
(() => {
  const form = document.getElementById('form');
  const promptInput = document.getElementById('prompt');
  const genBtn = document.getElementById('genBtn');
  const result = document.getElementById('result');
  const meta = document.getElementById('meta');
  const lastPromptEl = document.getElementById('lastPrompt');
  const metaTag = document.getElementById('metaTag');
  const downloadBtn = document.getElementById('downloadBtn');
  const chips = document.getElementById('chips');
  const refreshChips = document.getElementById('refreshChips');
  const switcher = document.querySelector('.switcher');
  const tweakBar = document.getElementById('tweakBar');
  const tweakHint = document.getElementById('tweakHint');
  const tweakInput = document.getElementById('tweakInput');
  const tweakBtn = document.getElementById('tweakBtn');
  const pwOverlay = document.getElementById('pwOverlay');
  const pwForm = document.getElementById('pwForm');
  const pwInput = document.getElementById('pwInput');
  const pwError = document.getElementById('pwError');
  const pwCancel = document.getElementById('pwCancel');

  const VALID_MODELS = ['pollinations', 'cloudflare-flux', 'kling'];
  let model = localStorage.getItem('nimbus_model') || 'pollinations';
  if (!VALID_MODELS.includes(model)) {
    model = 'pollinations';
    localStorage.setItem('nimbus_model', model);
  }
  syncModelUI();

  let currentImageUrl = null;
  let currentPrompt = '';
  let currentLabel = '';

  function syncModelUI() {
    document.querySelectorAll('.opt').forEach((b) => {
      b.classList.toggle('active', b.dataset.model === model);
    });
  }

  switcher.addEventListener('click', (e) => {
    const btn = e.target.closest('.opt');
    if (!btn) return;
    model = btn.dataset.model;
    localStorage.setItem('nimbus_model', model);
    syncModelUI();
  });

  // ============ PROMPT POOL ============
  // Pool of logistics / shipping / ecommerce creative prompts.
  // Refresh button picks 8 at random.
  const PROMPT_POOL = [
    { label: 'delivery rider', prompt: 'delivery rider on motorcycle in Indian street at golden hour, branded helmet, motion blur, cinematic photography, ultra detailed' },
    { label: 'diwali sale', prompt: 'festive Diwali sale banner for ecommerce shipping brand, gift boxes with diyas, vibrant colors, modern Indian aesthetic, hero composition' },
    { label: 'premium packaging', prompt: 'premium cardboard shipping package with branded label and twine, soft studio lighting, minimalist product photography, clean white backdrop' },
    { label: 'automated warehouse', prompt: 'modern automated warehouse interior with conveyor belts and stacked packages, cool blue ambient lighting, wide angle, photorealistic' },
    { label: 'monsoon courier', prompt: 'courier rider zooming through monsoon rain in Mumbai street, water splashes, dramatic atmosphere, cinematic photography, motion' },
    { label: 'freight truck', prompt: 'freight truck on highway at sunset, golden hour, motion blur, India national highway, wide cinematic shot, atmospheric' },
    { label: 'eco packaging', prompt: 'eco-friendly kraft paper shipping box with green ribbon and leaves, sustainability concept, soft natural light, editorial product photography' },
    { label: 'same-day hero', prompt: 'same-day delivery hero banner, fast motion blur, package being handed over, energetic, bold typography space, modern ecommerce' },
    { label: 'doorstep parcels', prompt: 'stack of cardboard parcels on a sunny doorstep, indian residential, warm light, cinematic still life photography' },
    { label: 'unboxing moment', prompt: 'customer happily unboxing a package at home, cozy living room, natural light, candid lifestyle photography, indian family vibe' },
    { label: 'kirana delivery', prompt: 'delivery van parked outside a bustling kirana store, indian neighborhood, documentary style, late afternoon light' },
    { label: 'drone delivery', prompt: 'drone delivery package landing on rooftop, modern indian apartment, blue sky, futuristic ecommerce concept, clean photography' },
    { label: 'holi sale', prompt: 'holi festive sale banner, vibrant color powder splashes, packages with rainbow ribbons, energetic composition, marketing hero' },
    { label: 'last-mile scooter', prompt: 'last mile delivery scooter weaving through traffic, top-down angle, urban india, motion-blurred cars, cinematic' },
    { label: 'barcode scan', prompt: 'warehouse worker scanning barcode on package, focused expression, industrial lighting, documentary photography, ultra sharp' },
    { label: 'cargo plane', prompt: 'cargo plane being loaded with shipping containers at airport, dawn, dramatic lighting, wide cinematic shot, photorealistic' },
    { label: 'truck hub at night', prompt: 'row of trucks at logistics hub at night, neon lights, drizzle, cyberpunk industrial mood, cinematic photography' },
    { label: 'fragile package', prompt: 'bubble-wrapped fragile package with handle-with-care label, soft studio lighting, minimal product photography, clean backdrop' },
    { label: 'christmas gifts', prompt: 'holiday season delivery rider with wrapped gift boxes, cozy festive mood, warm tones, marketing banner composition' },

    { label: 'small biz packing', prompt: 'small business owner carefully packing handmade products, cozy workshop, warm lighting, candid lifestyle photography' },

    { label: 'cold chain truck', prompt: 'cold chain refrigerated truck on highway, frost details on the body, professional logistics photography, cinematic' },
    { label: 'tape seal macro', prompt: 'close-up of hands sealing a cardboard box with branded packing tape, macro photography, soft studio light, ultra detailed' },
    { label: 'rakhi sale', prompt: 'festive raksha bandhan delivery banner, rakhi gift boxes with traditional motifs, warm tones, sibling theme, ecommerce hero' },
    { label: 'rural delivery', prompt: 'rural delivery rider on dusty village road, traditional indian setting, golden hour, documentary photography, atmospheric' },
    { label: 'tier-2 market', prompt: 'tier-2 city marketplace with delivery boys outside small shops, indian streetscape, candid documentary, bustling daylight' },
    { label: 'luxury unbox', prompt: 'luxury subscription box reveal moment, premium ecommerce styling, dark moody lighting, editorial photography, ultra detailed' },
    { label: 'control room', prompt: 'busy logistics control room with screens showing delivery routes, modern data dashboards, blue ambient lighting, technology feel' },
    { label: 'holi splash', prompt: 'package bursting with colorful holi powder splashes, dynamic motion freeze, festive marketing hero, vibrant photography' },
    { label: 'monsoon raincoat', prompt: 'raincoat-wearing delivery boy with waterproof package in heavy rain, cinematic motion, dramatic lighting, indian street' },
    { label: 'valentine gift', prompt: 'valentine’s day gift box with red ribbon and rose petals, romantic ecommerce hero, soft warm lighting, editorial' },
    { label: 'dawn dock', prompt: 'dawn warehouse loading dock, trucks lined up, golden light streaming through doors, atmospheric documentary photography' },
    { label: 'onam package', prompt: 'festive Onam sale package with banana leaves and traditional pookalam pattern, vibrant Kerala aesthetic, marketing hero' },
    { label: 'winter delivery', prompt: 'winter morning package delivery on a cozy doorstep with steam from chai, warm lighting, indian residential, lifestyle' },
    { label: 'subscription box flatlay', prompt: 'flatlay of curated subscription box contents, neat arrangement, brand styling, soft top-down studio light, premium ecommerce' },
    { label: 'rickshaw delivery', prompt: 'auto rickshaw stacked with parcels in indian street, tier-2 city aesthetic, candid documentary, golden afternoon' },
    { label: 'cycle courier', prompt: 'bicycle courier with insulated delivery bag in heritage indian street, soft golden light, candid lifestyle photography' },
    { label: 'package x-ray', prompt: 'concept image of package being scanned through x-ray, minimal techy aesthetic, blue and white palette, marketing visual' },
    { label: 'chai stop break', prompt: 'delivery rider taking chai break at roadside tapri, candid documentary moment, warm tones, indian street culture' },
  ];

  function pickRandomPrompts(n) {
    const shuffled = [...PROMPT_POOL].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, n);
  }

  function escapeAttr(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function renderChips() {
    const sample = pickRandomPrompts(8);
    chips.innerHTML = sample.map((p, i) =>
      `<button class="chip" style="animation-delay:${i * 25}ms" data-prompt="${escapeAttr(p.prompt)}">${escapeAttr(p.label)}</button>`
    ).join('');
  }
  renderChips();

  refreshChips.addEventListener('click', () => {
    refreshChips.classList.add('spinning');
    setTimeout(() => refreshChips.classList.remove('spinning'), 500);
    renderChips();
  });

  chips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    promptInput.value = chip.dataset.prompt;
    autoResizePrompt();
    promptInput.focus();
    promptInput.setSelectionRange(promptInput.value.length, promptInput.value.length);
  });

  // Auto-grow textarea up to its max-height (CSS), then scroll
  function autoResizePrompt() {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 240) + 'px';
  }
  promptInput.addEventListener('input', autoResizePrompt);

  // Cmd/Ctrl+Enter submits; plain Enter inserts newline
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function getPassword() { return localStorage.getItem('nimbus_token') || ''; }
  function askPassword() {
    return new Promise((resolve) => {
      pwError.textContent = '';
      pwInput.value = '';
      pwOverlay.classList.add('show');
      setTimeout(() => pwInput.focus(), 50);
      const onSubmit = (e) => {
        e.preventDefault();
        const v = pwInput.value.trim();
        if (!v) return;
        cleanup();
        pwOverlay.classList.remove('show');
        resolve(v);
      };
      const onCancel = () => { cleanup(); pwOverlay.classList.remove('show'); resolve(null); };
      function cleanup() {
        pwForm.removeEventListener('submit', onSubmit);
        pwCancel.removeEventListener('click', onCancel);
      }
      pwForm.addEventListener('submit', onSubmit);
      pwCancel.addEventListener('click', onCancel);
    });
  }

  async function genPollinations(prompt) {
    const seed = Math.floor(Math.random() * 1000000);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve({ url, mimeType: 'image/jpeg' });
      img.onerror = () => reject(new Error('Pollinations busy. Phir try kar.'));
      img.src = url;
    });
  }

  async function callBackend(endpoint, prompt, token) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({ prompt }),
    });
  }

  async function genFromFunction(endpoint, prompt) {
    let token = getPassword();
    let r = await callBackend(endpoint, prompt, token);
    if (r.status === 401) {
      localStorage.removeItem('nimbus_token');
      token = await askPassword();
      if (!token) throw new Error('Password chahiye is mode ke liye.');
      r = await callBackend(endpoint, prompt, token);
      if (r.status === 401) throw new Error('Wrong password.');
      localStorage.setItem('nimbus_token', token);
    }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error((data.error || 'Request failed') + (data.detail ? ' — ' + data.detail : ''));
    if (!data.image) throw new Error('No image returned.');
    return {
      url: `data:${data.mimeType || 'image/jpeg'};base64,${data.image}`,
      mimeType: data.mimeType || 'image/jpeg',
    };
  }

  async function genCloudflareFlux(prompt) {
    return genFromFunction('/.netlify/functions/cloudflare-flux', prompt);
  }

  // Kling is async — submit task, poll for result
  async function genKling(prompt) {
    let token = getPassword();

    async function attemptCreate(authToken) {
      const headers = { 'Content-Type': 'application/json' };
      if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
      return fetch('/.netlify/functions/kling-image-create', {
        method: 'POST',
        headers,
        body: JSON.stringify({ prompt }),
      });
    }

    let r = await attemptCreate(token);
    if (r.status === 401) {
      localStorage.removeItem('nimbus_token');
      token = await askPassword();
      if (!token) throw new Error('Password chahiye Kling ke liye.');
      r = await attemptCreate(token);
      if (r.status === 401) throw new Error('Wrong password.');
      localStorage.setItem('nimbus_token', token);
    }

    const created = await r.json().catch(() => ({}));
    if (!r.ok) {
      throw new Error((created.error || 'Kling create failed') + (created.detail ? ' — ' + created.detail : ''));
    }
    if (!created.task_id) {
      throw new Error('No task_id from Kling.');
    }

    // Poll up to 90s
    const taskId = created.task_id;
    const pollHeaders = {};
    if (token) pollHeaders['Authorization'] = 'Bearer ' + token;
    const start = Date.now();
    const TIMEOUT = 90 * 1000;

    while (Date.now() - start < TIMEOUT) {
      await new Promise((res) => setTimeout(res, 3500));
      const sr = await fetch('/.netlify/functions/kling-image-status?task_id=' + encodeURIComponent(taskId), {
        headers: pollHeaders,
      });
      const status = await sr.json().catch(() => ({}));
      if (!sr.ok) {
        throw new Error((status.error || 'Status check failed') + (status.detail ? ' — ' + status.detail : ''));
      }
      const ts = status.task_status;
      if (ts === 'succeed') {
        const url = status.images?.[0]?.url;
        if (!url) throw new Error('Kling succeeded but no image URL.');
        return { url, mimeType: 'image/png' };
      }
      if (ts === 'failed') {
        throw new Error('Kling generation failed: ' + (status.task_status_msg || 'no detail'));
      }
      // submitted | processing — keep polling
    }
    throw new Error('Kling timed out after 90s.');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    currentPrompt = prompt;
    currentLabel = model === 'cloudflare-flux' ? 'FLUX'
                  : model === 'kling' ? 'KLING'
                  : 'POLLINATIONS';

    genBtn.disabled = true;
    promptInput.disabled = true;
    genBtn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></span>Generating';
    result.classList.remove('empty');
    const renderText = model === 'cloudflare-flux'
      ? 'FLUX schnell on Cloudflare · 3-8s'
      : model === 'kling'
      ? 'Kling v2 · async · usually 20-45s'
      : 'Pollinations FLUX · 5-15s';
    result.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">${renderText}</div></div>`;
    meta.classList.add('hidden');
    hideTweakBar();

    try {
      const { url } = model === 'cloudflare-flux'
        ? await genCloudflareFlux(prompt)
        : model === 'kling'
        ? await genKling(prompt)
        : await genPollinations(prompt);
      currentImageUrl = url;
      const img = new Image();
      img.onload = () => {
        result.innerHTML = '';
        result.appendChild(img);
        lastPromptEl.textContent = prompt;
        metaTag.textContent = currentLabel;
        meta.classList.remove('hidden');
        showTweakBar();
      };
      img.onerror = () => {
        result.innerHTML = '<div class="error">Image load nahi hui. Try again.</div>';
      };
      img.src = url;
    } catch (err) {
      result.innerHTML = '<div class="error">' + (err.message || 'Generate fail.') + '</div>';
    } finally {
      genBtn.disabled = false;
      promptInput.disabled = false;
      genBtn.textContent = 'Generate';
    }
  });

  // ============ TWEAK / IMAGE EDIT ============
  function showTweakBar() {
    tweakBar.classList.remove('hidden');
    tweakHint.classList.remove('hidden');
  }
  function hideTweakBar() {
    tweakBar.classList.add('hidden');
    tweakHint.classList.add('hidden');
    tweakInput.value = '';
  }

  async function urlToBase64(url) {
    if (url.startsWith('data:')) return url; // already a data URL
    const blob = await (await fetch(url)).blob();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function callTweakBackend(prompt, sourceImage, token) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return fetch('/.netlify/functions/cloudflare-flux-edit', {
      method: 'POST',
      headers,
      body: JSON.stringify({ prompt, sourceImage }),
    });
  }

  async function tweakImage(editPrompt) {
    if (!currentImageUrl) throw new Error('No image to tweak yet.');
    const sourceImage = await urlToBase64(currentImageUrl);

    let token = getPassword();
    let r = await callTweakBackend(editPrompt, sourceImage, token);
    if (r.status === 401) {
      localStorage.removeItem('nimbus_token');
      token = await askPassword();
      if (!token) throw new Error('Password chahiye is mode ke liye.');
      r = await callTweakBackend(editPrompt, sourceImage, token);
      if (r.status === 401) throw new Error('Wrong password.');
      localStorage.setItem('nimbus_token', token);
    }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error((data.error || 'Request failed') + (data.detail ? ' — ' + data.detail : ''));
    if (!data.image) throw new Error('No image returned.');
    return {
      url: `data:${data.mimeType || 'image/jpeg'};base64,${data.image}`,
      mimeType: data.mimeType || 'image/jpeg',
    };
  }

  async function runTweak() {
    const editPrompt = tweakInput.value.trim();
    if (!editPrompt || !currentImageUrl) return;

    tweakBtn.disabled = true;
    tweakInput.disabled = true;
    const originalLabel = tweakBtn.textContent;
    tweakBtn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></span>Editing';

    // Show loading on result while preserving previous image faintly
    const previousHTML = result.innerHTML;
    result.classList.remove('empty');
    result.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">FLUX.2 klein editing · 6-12s</div></div>';

    try {
      const { url } = await tweakImage(editPrompt);
      currentImageUrl = url;
      // Append the tweak to the recorded prompt for clarity
      currentPrompt = currentPrompt + '  ↳  ' + editPrompt;
      currentLabel = 'TWEAK';

      const img = new Image();
      img.onload = () => {
        result.innerHTML = '';
        result.appendChild(img);
        lastPromptEl.textContent = currentPrompt;
        metaTag.textContent = currentLabel;
        meta.classList.remove('hidden');
        tweakInput.value = '';
      };
      img.onerror = () => {
        result.innerHTML = '<div class="error">Image load nahi hui.</div>';
      };
      img.src = url;
    } catch (err) {
      result.innerHTML = '<div class="error">' + (err.message || 'Tweak fail.') + '</div>';
    } finally {
      tweakBtn.disabled = false;
      tweakInput.disabled = false;
      tweakBtn.textContent = originalLabel || 'Apply tweak';
    }
  }

  tweakBtn.addEventListener('click', runTweak);
  tweakInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      runTweak();
    }
  });

  downloadBtn.addEventListener('click', async () => {
    if (!currentImageUrl) return;
    downloadBtn.textContent = '↓ ...';
    try {
      let blob;
      if (currentImageUrl.startsWith('data:')) {
        blob = await (await fetch(currentImageUrl)).blob();
      } else {
        blob = await fetch(currentImageUrl).then((r) => r.blob());
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const safeName = currentPrompt.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 50);
      const ext = blob.type.includes('png') ? 'png' : 'jpg';
      a.download = `nimbus-${safeName}-${Date.now()}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
      downloadBtn.textContent = '↓ Saved';
      setTimeout(() => (downloadBtn.textContent = '↓ Download'), 1200);
    } catch {
      downloadBtn.textContent = '✕ Failed';
      setTimeout(() => (downloadBtn.textContent = '↓ Download'), 1500);
    }
  });

  promptInput.focus();
})();
</script>
