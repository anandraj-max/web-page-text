<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anand</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0e0d0b;
    color: #f4ede0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .stack {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  h1 {
    font-size: clamp(56px, 12vw, 96px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .echo {
    min-height: 36px;
    font-size: 22px;
    color: #ffb800;
    text-align: center;
    word-break: break-word;
  }
  form {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  input[type="text"] {
    flex: 1;
    background: #1c1b18;
    border: 1px solid #2e2d2a;
    color: #f4ede0;
    padding: 14px 16px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #ff5e1f;
  }
  button {
    background: #ff5e1f;
    color: #1a0a00;
    border: none;
    padding: 14px 20px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="stack">
    <h1>Anand</h1>
    <div class="echo" id="echo"></div>
    <form id="form">
      <input type="text" id="input" placeholder="Kuch type kar..." autocomplete="off" />
      <button type="submit">Show</button>
    </form>
  </div>
<script>
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const echo = document.getElementById('echo');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const value = input.value.trim();
    echo.textContent = value;
    input.value = '';
    input.focus();
  });
</script>
</body>
</html>
