<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nimbus marketing · image gen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0e0d0b;
    color: #f4ede0;
    min-height: 100vh;
    padding: 32px 20px 64px;
  }
  .stack {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .brand { text-align: center; margin-top: 6vh; line-height: 0.9; }
  .brand-1 {
    font-size: clamp(48px, 9vw, 84px);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: #f4ede0;
  }
  .brand-2 {
    font-size: clamp(20px, 3.2vw, 30px);
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.01em;
    color: #b3ab9b;
    margin-top: 4px;
  }

  /* Model switcher */
  .model-switcher {
    display: inline-flex;
    background: #161513;
    border: 1px solid #2e2d2a;
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }
  .model-opt {
    padding: 8px 16px;
    border: none;
    background: transparent;
    color: #6b6558;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .model-opt:hover { color: #b3ab9b; }
  .model-opt.active {
    background: #ff5e1f;
    color: #1a0a00;
  }
  .model-opt.active.premium {
    background: #ffb800;
  }
  .model-meta {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    opacity: 0.7;
    font-weight: 400;
  }
  .model-opt.active .model-meta { opacity: 0.7; }

  /* Prompt chips */
  .suggestions {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .suggestions-label {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b6558;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: #1c1b18;
    color: #b3ab9b;
    border: 1px solid #2e2d2a;
    padding: 8px 14px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { background: #232220; border-color: #ff5e1f; color: #f4ede0; }
  .chip:active { transform: translateY(1px); }

  /* Form */
  form { width: 100%; display: flex; gap: 8px; margin-top: 4px; }
  input[type="text"] {
    flex: 1;
    background: #1c1b18;
    border: 1px solid #2e2d2a;
    color: #f4ede0;
    padding: 16px 18px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 16px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #ff5e1f;
    box-shadow: 0 0 0 4px rgba(255,94,31,0.15);
  }
  input[type="text"]:disabled { opacity: 0.5; }
  button.gen {
    background: #ff5e1f;
    color: #1a0a00;
    border: none;
    padding: 16px 22px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 8px 24px rgba(255,94,31,0.25);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  button.gen.premium { background: #ffb800; box-shadow: 0 8px 24px rgba(255,184,0,0.25); }
  button.gen:hover:not(:disabled) { transform: translateY(-2px); }
  button.gen:active:not(:disabled) { transform: translateY(0); }
  button.gen:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

  /* Result */
  .result {
    width: 100%;
    min-height: 200px;
    margin-top: 4px;
    border-radius: 18px;
    background: #161513;
    border: 1px solid #2e2d2a;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .result.empty::before {
    content: 'Image yahan dikhega';
    color: #4a4640;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .result img { display: block; width: 100%; height: auto; }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px 20px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2e2d2a;
    border-top-color: #ff5e1f;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b6558;
    text-align: center;
    max-width: 360px;
  }
  .error {
    padding: 28px 24px;
    text-align: center;
    color: #f87171;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .meta {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-prompt {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 12px;
    color: #b3ab9b;
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }
  .meta-prompt span { color: #6b6558; margin-right: 6px; }
  .meta-tag {
    background: #232220;
    color: #ff5e1f;
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .meta-tag.premium { color: #ffb800; }
  .download-btn {
    background: #1c1b18;
    color: #f4ede0;
    border: 1px solid #2e2d2a;
    padding: 8px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .download-btn:hover { background: #2e2d2a; border-color: #3d3b37; }

  /* Password modal */
  .pw-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pw-overlay.show { display: flex; }
  .pw-card {
    background: #1c1b18;
    border: 1px solid #2e2d2a;
    border-radius: 18px;
    padding: 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .pw-card h3 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .pw-card p {
    color: #b3ab9b;
    font-size: 13px;
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .pw-card form { display: flex; flex-direction: column; gap: 10px; }
  .pw-card input {
    width: 100%;
    padding: 14px 16px;
    background: #0e0d0b;
    border: 1px solid #2e2d2a;
    border-radius: 12px;
    color: #f4ede0;
    font-family: inherit;
    font-size: 15px;
  }
  .pw-card input:focus { outline: none; border-color: #ff5e1f; box-shadow: 0 0 0 3px rgba(255,94,31,0.15); }
  .pw-card .pw-actions { display: flex; gap: 8px; }
  .pw-card button {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .pw-card button.primary { background: #ff5e1f; color: #1a0a00; }
  .pw-card button.ghost { background: #232220; color: #b3ab9b; border: 1px solid #2e2d2a; }
  .pw-error {
    color: #f87171;
    font-size: 12px;
    min-height: 16px;
  }
</style>
</head>
<body>
  <div class="stack">
    <div class="brand">
      <div class="brand-1">Nimbus</div>
      <div class="brand-2">marketing</div>
    </div>

    <div class="model-switcher" role="radiogroup" aria-label="Model">
      <button class="model-opt active" data-model="pollinations">
        Pollinations <span class="model-meta">free · instant</span>
      </button>
      <button class="model-opt premium" data-model="cloudflare-flux">
        FLUX schnell <span class="model-meta">cf · free 200/day</span>
      </button>
    </div>

    <div class="suggestions">
      <div class="suggestions-label">▸ try a logistics prompt</div>
      <div class="chips" id="chips">
        <button class="chip" data-prompt="delivery rider on motorcycle in Indian street at golden hour, branded helmet, motion blur, cinematic photography, ultra detailed">delivery rider · golden hour</button>
        <button class="chip" data-prompt="festive Diwali sale banner for ecommerce shipping brand, gift boxes with diyas, vibrant colors, modern Indian aesthetic, hero composition">diwali sale banner</button>
        <button class="chip" data-prompt="premium cardboard shipping package with branded label and twine, soft studio lighting, minimalist product photography, clean white backdrop">premium packaging shot</button>
        <button class="chip" data-prompt="modern automated warehouse interior with conveyor belts and stacked packages, cool blue ambient lighting, wide angle, photorealistic">automated warehouse</button>
        <button class="chip" data-prompt="courier rider zooming through monsoon rain in Mumbai street, water splashes, dramatic atmosphere, cinematic photography, motion">monsoon courier</button>
        <button class="chip" data-prompt="freight truck on highway at sunset, golden hour, motion blur, India national highway, wide cinematic shot, atmospheric">freight truck · highway</button>
        <button class="chip" data-prompt="eco-friendly kraft paper shipping box with green ribbon and leaves, sustainability concept, soft natural light, editorial product photography">eco-friendly packaging</button>
        <button class="chip" data-prompt="same-day delivery hero banner, fast motion blur, package being handed over, energetic, bold typography space, modern ecommerce">same-day delivery hero</button>
      </div>
    </div>

    <form id="form">
      <input type="text" id="prompt" placeholder="Describe the image — or pick a chip above" autocomplete="off" />
      <button type="submit" class="gen" id="genBtn">Generate</button>
    </form>

    <div class="result empty" id="result"></div>
    <div class="meta" id="meta" style="display:none;">
      <div class="meta-prompt">
        <span class="meta-tag" id="metaTag">FLUX</span>
        <span>prompt:</span><span id="lastPrompt"></span>
      </div>
      <button class="download-btn" id="downloadBtn">↓ Download</button>
    </div>
  </div>

  <!-- Password modal for Nano Banana -->
  <div class="pw-overlay" id="pwOverlay">
    <div class="pw-card">
      <h3>Dashboard password</h3>
      <p>Nano Banana use karne ke liye one-time password chahiye (browser me save ho jayega).</p>
      <form id="pwForm">
        <input type="password" id="pwInput" placeholder="password" autocomplete="off" />
        <div class="pw-error" id="pwError"></div>
        <div class="pw-actions">
          <button type="button" class="ghost" id="pwCancel">Cancel</button>
          <button type="submit" class="primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

<script>
(() => {
  const form = document.getElementById('form');
  const promptInput = document.getElementById('prompt');
  const genBtn = document.getElementById('genBtn');
  const result = document.getElementById('result');
  const meta = document.getElementById('meta');
  const lastPromptEl = document.getElementById('lastPrompt');
  const metaTag = document.getElementById('metaTag');
  const downloadBtn = document.getElementById('downloadBtn');
  const chips = document.getElementById('chips');
  const switcher = document.querySelector('.model-switcher');
  const pwOverlay = document.getElementById('pwOverlay');
  const pwForm = document.getElementById('pwForm');
  const pwInput = document.getElementById('pwInput');
  const pwError = document.getElementById('pwError');
  const pwCancel = document.getElementById('pwCancel');

  // Selected model — persist in localStorage
  const VALID_MODELS = ['pollinations', 'cloudflare-flux'];
  let model = localStorage.getItem('nimbus_model') || 'pollinations';
  if (!VALID_MODELS.includes(model)) {
    model = 'pollinations';
    localStorage.setItem('nimbus_model', model);
  }
  syncModelUI();

  let currentImageUrl = null;
  let currentPrompt = '';
  let currentLabel = '';

  function syncModelUI() {
    document.querySelectorAll('.model-opt').forEach((b) => {
      b.classList.toggle('active', b.dataset.model === model);
    });
    if (model === 'cloudflare-flux') {
      genBtn.classList.add('premium');
    } else {
      genBtn.classList.remove('premium');
    }
  }

  switcher.addEventListener('click', (e) => {
    const btn = e.target.closest('.model-opt');
    if (!btn) return;
    model = btn.dataset.model;
    localStorage.setItem('nimbus_model', model);
    syncModelUI();
  });

  chips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    promptInput.value = chip.dataset.prompt;
    promptInput.focus();
    promptInput.setSelectionRange(promptInput.value.length, promptInput.value.length);
  });

  // Password gate
  function getPassword() {
    return localStorage.getItem('nimbus_token') || '';
  }
  function askPassword() {
    return new Promise((resolve) => {
      pwError.textContent = '';
      pwInput.value = '';
      pwOverlay.classList.add('show');
      setTimeout(() => pwInput.focus(), 50);

      const onSubmit = (e) => {
        e.preventDefault();
        const v = pwInput.value.trim();
        if (!v) return;
        cleanup();
        pwOverlay.classList.remove('show');
        resolve(v);
      };
      const onCancel = () => {
        cleanup();
        pwOverlay.classList.remove('show');
        resolve(null);
      };
      function cleanup() {
        pwForm.removeEventListener('submit', onSubmit);
        pwCancel.removeEventListener('click', onCancel);
      }
      pwForm.addEventListener('submit', onSubmit);
      pwCancel.addEventListener('click', onCancel);
    });
  }

  // Generation flows
  async function genPollinations(prompt) {
    const seed = Math.floor(Math.random() * 1000000);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve({ url, mimeType: 'image/jpeg' });
      img.onerror = () => reject(new Error('Pollinations busy. Phir try kar.'));
      img.src = url;
    });
  }

  async function callBackend(endpoint, prompt, token) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({ prompt }),
    });
  }

  async function genFromFunction(endpoint, prompt) {
    // First attempt — use stored token if any, else no auth header.
    // The server only enforces auth if DASHBOARD_PASSWORD env var is set.
    let token = getPassword();
    let r = await callBackend(endpoint, prompt, token);

    if (r.status === 401) {
      localStorage.removeItem('nimbus_token');
      token = await askPassword();
      if (!token) throw new Error('Password chahiye is mode ke liye.');
      r = await callBackend(endpoint, prompt, token);
      if (r.status === 401) {
        throw new Error('Wrong password.');
      }
      localStorage.setItem('nimbus_token', token);
    }

    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      throw new Error((data.error || 'Request failed') + (data.detail ? ' — ' + data.detail : ''));
    }
    if (!data.image) {
      throw new Error('No image returned. ' + (data.textOutput || ''));
    }
    return {
      url: `data:${data.mimeType || 'image/jpeg'};base64,${data.image}`,
      mimeType: data.mimeType || 'image/jpeg',
    };
  }

  async function genCloudflareFlux(prompt) {
    return genFromFunction('/.netlify/functions/cloudflare-flux', prompt);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    currentPrompt = prompt;
    currentLabel = model === 'cloudflare-flux' ? 'FLUX schnell' : 'Pollinations';

    genBtn.disabled = true;
    promptInput.disabled = true;
    genBtn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span>Generating';
    result.classList.remove('empty');
    const renderText = model === 'cloudflare-flux'
      ? 'FLUX schnell on Cloudflare · usually 3-8s'
      : 'FLUX rendering on Pollinations · usually 5-15s';
    result.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">${renderText}</div></div>`;
    meta.style.display = 'none';

    try {
      const { url } = model === 'cloudflare-flux' ? await genCloudflareFlux(prompt) : await genPollinations(prompt);
      currentImageUrl = url;
      const img = new Image();
      img.onload = () => {
        result.innerHTML = '';
        result.appendChild(img);
        lastPromptEl.textContent = prompt;
        metaTag.textContent = currentLabel;
        metaTag.classList.toggle('premium', model === 'cloudflare-flux');
        meta.style.display = 'flex';
      };
      img.onerror = () => {
        result.innerHTML = '<div class="error">Image load nahi hui. Try again.</div>';
      };
      img.src = url;
    } catch (err) {
      result.innerHTML = '<div class="error">' + (err.message || 'Generate fail.') + '</div>';
    } finally {
      genBtn.disabled = false;
      promptInput.disabled = false;
      genBtn.textContent = 'Generate';
    }
  });

  downloadBtn.addEventListener('click', async () => {
    if (!currentImageUrl) return;
    downloadBtn.textContent = '↓ ...';
    try {
      let blob;
      if (currentImageUrl.startsWith('data:')) {
        // base64 data URL — convert directly
        const res = await fetch(currentImageUrl);
        blob = await res.blob();
      } else {
        blob = await fetch(currentImageUrl).then((r) => r.blob());
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const safeName = currentPrompt.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 50);
      const ext = blob.type.includes('png') ? 'png' : 'jpg';
      a.download = `nimbus-${safeName}-${Date.now()}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
      downloadBtn.textContent = '↓ Saved';
      setTimeout(() => (downloadBtn.textContent = '↓ Download'), 1200);
    } catch {
      downloadBtn.textContent = '✕ Failed';
      setTimeout(() => (downloadBtn.textContent = '↓ Download'), 1500);
    }
  });

  promptInput.focus();
})();
</script>
</body>
</html>
